name: KB 시세 알림

on:
  schedule:
    - cron: "0 3 * * 5" # 매주 금요일 12:00 KST (UTC 03:00)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/notify.mjs
        env:
          HOUSE_COMPLEX_ID: ${{ secrets.HOUSE_COMPLEX_ID }}
          HOUSE_AREA_SN: ${{ secrets.HOUSE_AREA_SN }}
          HOUSE_LABEL: ${{ secrets.HOUSE_LABEL }}
          CRON_EXPIRE_DATE: ${{ secrets.CRON_EXPIRE_DATE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # GitHub은 60일간 커밋이 없는 저장소의 scheduled workflow를 자동 비활성화한다.
      # 실행할 때마다 타임스탬프를 커밋해서 저장소를 계속 "활성" 상태로 유지한다.
      - if: always()
        run: |
          echo "last run: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .last-run
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-run
          git diff --cached --quiet || git commit -m "chore: record cron run $(date -u +%F)"
          git push
