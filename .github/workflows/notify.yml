name: KB 시세 알림

on:
  schedule:
    - cron: "0 3 * * 5" # 매주 금요일 12:00 KST (UTC 03:00)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/notify.mjs
        env:
          HOUSE_COMPLEX_ID: ${{ secrets.HOUSE_COMPLEX_ID }}
          HOUSE_AREA_SN: ${{ secrets.HOUSE_AREA_SN }}
          HOUSE_LABEL: ${{ secrets.HOUSE_LABEL }}
          CRON_EXPIRE_DATE: ${{ secrets.CRON_EXPIRE_DATE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
